<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Heredia Garage - Venta de vehículos de alta gama.">
    <title>Heredia Garage | Venta de Vehículos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-section">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">
                    <i class="fas fa-car-side me-2"></i>Heredia Garage
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item"><a class="nav-link" href="#inicio">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="#vehiculos">Vehículos</a></li>
                    </ul>
                    <div class="d-flex align-items-center">
                        <input class="form-control me-2" type="search" id="searchInput" placeholder="Buscar marca o modelo..." aria-label="Buscar">
                        <button class="btn btn-outline-light position-relative" data-bs-toggle="modal" data-bs-target="#cartModal">
                            <i class="fas fa-shopping-cart"></i>
                            <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                        </button>
                    </div>
                </div>
            </div>
        </nav>
        
        <div id="inicio" class="hero-content d-flex align-items-center justify-content-center text-center">
            <div class="text-white px-3">
                <h1 class="display-3 fw-bold">Heredia Garage</h1>
                <p class="lead">Excelencia y confianza en cada kilómetro.</p>
                <a href="#vehiculos" class="btn btn-primary btn-lg mt-3 shadow-lg">Explorar Inventario</a>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <section id="vehiculos">
            <h2 class="text-center mb-5 fw-bold">Nuestros Vehículos</h2>
            <div id="loadingSpinner" class="text-center my-5">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
            <div class="row" id="productsContainer"></div>
        </section>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2024 Heredia Garage. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- MODALES (Detalle, Carrito y Pago) -->
    <div class="modal fade" id="quantityModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalles del Vehículo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <img id="detailImage" src="" class="img-fluid rounded shadow" alt="Vehículo">
                        </div>
                        <div class="col-md-6">
                            <h3 id="detailVehicleName"></h3>
                            <p id="detailDescription" class="text-muted"></p>
                            <ul class="list-group list-group-flush mb-3">
                                <li class="list-group-item"><strong>Categoría:</strong> <span id="detailCat"></span></li>
                                <li class="list-group-item"><strong>Precio:</strong> <span id="detailPrice" class="text-primary fw-bold"></span></li>
                            </ul>
                            <div class="mb-3">
                                <label for="quantityInput" class="form-label">Cantidad:</label>
                                <input type="number" id="quantityInput" class="form-control" value="1" min="1">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" id="addToCartBtn" class="btn btn-primary">Añadir al Carrito</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Carrito -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-shopping-cart me-2"></i>Tu Carrito</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="cartItems" class="table-responsive"></div>
                    <div class="text-end mt-3">
                        <h4>Total: <span id="cartTotal">$0</span></h4>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Seguir Viendo</button>
                    <button type="button" id="checkoutBtn" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#paymentModal">Proceder al Pago</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Pago -->
    <div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Datos de Pago</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="paymentForm">
                        <div class="mb-3">
                            <label class="form-label">Nombre del Titular</label>
                            <input type="text" id="payName" class="form-control" placeholder="Juan Pérez" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Número de Tarjeta</label>
                            <input type="text" class="form-control" placeholder="0000 0000 0000 0000" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Vencimiento</label>
                                <input type="text" class="form-control" placeholder="MM/AA" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">CVC</label>
                                <input type="text" class="form-control" placeholder="123" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="processPaymentBtn" class="btn btn-primary w-100">Finalizar Compra y Generar Factura</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
